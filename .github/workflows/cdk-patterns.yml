name: cdk-patterns
on:
  push:
    branches: [main]
    paths:
      # Build when there are changes in the directory that holds the component,
      # or when this workflow file is changed
      - "cdk-patterns/**"
      - ".github/workflows/cdk-patterns.yml"

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: git setup
        run: |
          git config --global user.name "${{ github.workflow }}"
          git config --global user.email "gha@scloud/${{ github.workflow }}"

      - name: Build
        working-directory: ./${{ github.workflow }}
        run: |
          npm install
          npm run lint
          npm run compile
          npm run package

      - name: Publish
        working-directory: ./${{ github.workflow }}
        run: |
          npm publish --provenance --access public

      - name: Push
        working-directory: ./${{ github.workflow }}
        if: always()
        run: |
          # Push updated package.json to Github
          # We need this to happen always to avoid the repo getting stuck on an already-published version
          npm version patch
          git commit -am "Patch version" || true
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main
            if git push origin main; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt/5), retrying..."
            sleep $((attempt * 2))
          done
          echo "Failed to push after 5 attempts"
          exit 1
